services:
  tlk-web:
    container_name: ${TLK_WEB_CONTAINER_NAME:-tlk-web}
    build:
      context: ../tlk-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TLK_WEB_HOST_PORT:-9070}:80"

  translation-engine:
    image: libretranslate/libretranslate:latest
    container_name: ${LT_ENGINE_CONTAINER_NAME:-lt-engine}
    user: "0:0"
    restart: unless-stopped
    expose:
      - "${LT_ENGINE_INTERNAL_PORT:-5000}"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "${LT_ENGINE_INTERNAL_PORT:-5000}"
      - --threads
      - "${LT_THREADS:-4}"
      - --load-only
      - "${LT_LOAD_ONLY:-en,pl,de,fr,es,it}"
    volumes:
      - lt_models:/home/libretranslate/.local

  translation-proxy:
    image: caddy:2
    container_name: ${LT_PROXY_CONTAINER_NAME:-lt-proxy}
    restart: unless-stopped
    depends_on:
      - translation-engine
    environment:
      LT_UPSTREAM: translation-engine:${LT_ENGINE_INTERNAL_PORT:-5000}
    ports:
      - "${LT_HOST_HTTP_PORT:-9080}:80"
      - "${LT_HOST_HTTPS_PORT:-9443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  lt_models:
  caddy_data:
  caddy_config:
